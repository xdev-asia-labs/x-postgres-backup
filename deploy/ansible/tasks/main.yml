---
- name: Create application user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Create backup directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  loop:
    - "{{ backup_dir }}"
    - "{{ backup_dir }}/basebackup"
    - "{{ backup_dir }}/pg_dump"
    - "{{ backup_dir }}/logs"
    - "{{ app_dir }}/data"

- name: Clone or update application
  ansible.builtin.git:
    repo: https://github.com/xdev-asia-labs/x-postgres-backup.git
    dest: "{{ app_dir }}"
    version: main
    force: true
  notify: Restart x-postgres-backup

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/venv"
    virtualenv_command: python3 -m venv

- name: Deploy environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0600"
  notify: Restart x-postgres-backup

- name: Deploy systemd service
  ansible.builtin.template:
    src: x-postgres-backup.service.j2
    dest: /etc/systemd/system/x-postgres-backup.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart x-postgres-backup

- name: Enable and start service
  ansible.builtin.systemd:
    name: x-postgres-backup
    enabled: true
    state: started
