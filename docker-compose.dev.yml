# Development override: only run postgres, app runs locally via uvicorn --reload
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:18.3
    container_name: xpb-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: xpb
      POSTGRES_USER: xpb
      POSTGRES_PASSWORD: ${XPB_DB_PASSWORD:-xpb}
    ports:
      - "5432:5432"
    volumes:
      - pg-dev-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xpb -d xpb"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg-dev-data:
    driver: local
