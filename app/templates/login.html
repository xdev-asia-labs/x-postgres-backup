<!DOCTYPE html>
<html lang="{{ lang|default('en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('login.title') }} - x-postgres-backup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .lang-switch { position: absolute; top: 1rem; right: 1rem; }
        .lang-switch a {
            display: inline-block; padding: 0.25rem 0.5rem; border-radius: 0.25rem;
            font-size: 0.75rem; color: rgba(255,255,255,0.7); text-decoration: none;
            transition: all 0.15s;
        }
        .lang-switch a:hover, .lang-switch a.active { color: #fff; background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <!-- Language Switcher -->
    <div class="lang-switch">
        {% for code in SUPPORTED_LANGUAGES %}
        <a href="/set-language/{{ code }}" class="{% if lang == code %}active{% endif %}">{{ LANGUAGE_NAMES.get(code, code) }}</a>
        {% endfor %}
    </div>

    <div class="bg-white rounded-lg shadow-2xl w-full max-w-md p-8">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🐘 {{ _('login.app_name') }}</h1>
            <p class="text-gray-600 mt-2">{{ _('login.app_desc') }}</p>
        </div>

        <!-- Login Form -->
        <div id="login-form">
            <h2 class="text-2xl font-semibold text-gray-700 mb-6">{{ _('login.sign_in') }}</h2>

            <!-- Error Message -->
            <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" role="alert">
                <span class="block sm:inline" id="error-text"></span>
            </div>

            <!-- Success Message -->
            <div id="success-message" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4" role="alert">
                <span class="block sm:inline" id="success-text"></span>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">{{ _('login.email') }}</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="{{ _('login.email_placeholder') }}">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">{{ _('login.password') }}</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="{{ _('login.password_placeholder') }}">
                </div>
                <button type="submit"
                    class="w-full bg-purple-600 text-white py-2 px-4 rounded-lg hover:bg-purple-700 transition duration-200 font-medium">
                    {{ _('login.sign_in_btn') }}
                </button>
            </form>

            <!-- SSO Options -->
            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">{{ _('login.or_continue_with') }}</span>
                    </div>
                </div>
                <div class="mt-6 grid grid-cols-2 gap-3">
                    <a href="/auth/google/login"
                        class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition duration-200">
                        <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </a>
                    <a href="/auth/microsoft/login"
                        class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition duration-200">
                        <svg class="w-5 h-5 mr-2" viewBox="0 0 23 23">
                            <path fill="#f3f3f3" d="M0 0h23v23H0z"/>
                            <path fill="#f35325" d="M1 1h10v10H1z"/>
                            <path fill="#81bc06" d="M12 1h10v10H12z"/>
                            <path fill="#05a6f0" d="M1 12h10v10H1z"/>
                            <path fill="#ffba08" d="M12 12h10v10H12z"/>
                        </svg>
                        Microsoft
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script>
        const i18n = {
            loginSuccess: '{{ _("login.login_success") }}',
            loginFailed: '{{ _("login.login_failed") }}',
            errorGeneric: '{{ _("login.error_generic") }}'
        };

        function showError(msg) {
            const d = document.getElementById('error-message'), t = document.getElementById('error-text');
            t.textContent = msg; d.classList.remove('hidden');
            setTimeout(() => d.classList.add('hidden'), 5000);
        }
        function showSuccess(msg) {
            const d = document.getElementById('success-message'), t = document.getElementById('success-text');
            t.textContent = msg; d.classList.remove('hidden');
            setTimeout(() => d.classList.add('hidden'), 5000);
        }
        function hideMessages() {
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('success-message').classList.add('hidden');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); hideMessages();
            const formData = { email: document.getElementById('email').value, password: document.getElementById('password').value };
            try {
                const resp = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(formData) });
                const data = await resp.json();
                if (resp.ok) { showSuccess(i18n.loginSuccess); setTimeout(() => { window.location.href = '/'; }, 1000); }
                else { showError(data.detail || i18n.loginFailed); }
            } catch (err) { showError(i18n.errorGeneric); console.error('Login error:', err); }
        });
    </script>
</body>
</html>
